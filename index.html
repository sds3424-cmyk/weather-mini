<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SKIES — Weather</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0c0c0c; --surface: #141414; --surface2: #1e1e1e;
    --border: #2a2a2a; --text: #f0f0f0; --muted: #666; --dim: #999;
    --accent: #f5f520; --accent-dim: #c8c810; --white: #ffffff;
  }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 15px; line-height: 1.5; min-height: 100vh;
    display: flex; flex-direction: column; -webkit-font-smoothing: antialiased;
  }

  /* HEADER */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg); border-bottom: 1px solid var(--border); padding: 0 2rem;
  }
  .header-inner {
    max-width: 1200px; margin: 0 auto; height: 56px;
    display: flex; align-items: center; gap: 2rem;
  }
  .logo { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent); }
  .nav { display: flex; gap: 0.25rem; }
  .nav a {
    font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); padding: 0.4rem 0.8rem; border: 1px solid transparent;
    text-decoration: none; transition: all 0.15s;
  }
  .nav a:hover, .nav a.active { color: var(--text); border-color: var(--border); }
  .unit-btn {
    margin-left: auto; font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); background: none; border: 1px solid var(--border);
    padding: 0.3rem 0.9rem; cursor: pointer; transition: all 0.15s; font-family: inherit;
  }
  .unit-btn:hover { color: var(--accent); border-color: var(--accent); }

  /* HERO */
  .hero { padding: 5rem 2rem 4rem; border-bottom: 1px solid var(--border); }
  .hero-inner { max-width: 640px; margin: 0 auto; text-align: center; }
  .eyebrow { font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent); margin-bottom: 1.5rem; }
  .hero-title {
    font-size: clamp(3rem, 9vw, 5.5rem); font-weight: 800; line-height: 1;
    letter-spacing: -0.03em; color: var(--white); margin-bottom: 2.5rem;
  }
  .hero-title span { color: var(--accent); }

  /* SEARCH FORM */
  .search-form { display: flex; max-width: 500px; margin: 0 auto 1rem; }
  .search-input {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-right: none; color: var(--text); font-size: 0.9rem;
    padding: 0.85rem 1.2rem; outline: none; font-family: inherit;
    transition: border-color 0.15s; -webkit-appearance: none;
  }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: var(--accent); }
  .search-btn {
    background: var(--accent); color: #000; border: none;
    padding: 0.85rem 1.6rem; font-size: 0.8rem; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
    font-family: inherit; transition: background 0.15s; white-space: nowrap;
    -webkit-appearance: none;
  }
  .search-btn:hover { background: var(--accent-dim); }
  .search-btn:active { transform: scale(0.98); }

  .loc-btn {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase;
    font-family: inherit; transition: color 0.15s; display: inline-flex;
    align-items: center; gap: 0.4rem; padding: 0.5rem;
  }
  .loc-btn:hover { color: var(--text); }

  /* WEATHER SECTION */
  .weather-section { flex: 1; padding: 3rem 2rem 5rem; animation: fadeUp 0.35s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  .container { max-width: 1200px; margin: 0 auto; }

  /* Main card */
  .main-card {
    background: var(--surface); border: 1px solid var(--border);
    padding: 2.5rem 3rem; display: grid;
    grid-template-columns: 1fr auto; gap: 1rem 4rem; margin-bottom: 2px;
  }
  .city-tag {
    display: inline-flex; align-items: center; gap: 0.4rem;
    font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--muted); border: 1px solid var(--border);
    padding: 0.3rem 0.75rem; margin-bottom: 0.5rem;
  }
  .local-time { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.05em; }
  .temp-col { text-align: right; grid-row: 1 / 3; }
  .temp-big {
    font-size: clamp(4.5rem, 12vw, 8rem); font-weight: 800;
    line-height: 1; color: var(--white); letter-spacing: -0.04em;
  }
  .condition-row {
    display: flex; align-items: center; gap: 0.5rem;
    justify-content: flex-end; margin-top: 0.5rem;
  }
  .cond-icon { font-size: 1.5rem; line-height: 1; }
  .cond-text { font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--dim); }
  .feels { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.05em; align-self: end; }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: repeat(6,1fr); gap: 2px; margin-bottom: 2px; }
  .stat { background: var(--surface); border: 1px solid var(--border); padding: 1.25rem 1.5rem; }
  .stat-label { font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.6rem; }
  .stat-val { font-size: 1.75rem; font-weight: 700; color: var(--white); line-height: 1; letter-spacing: -0.02em; }
  .stat-unit { font-size: 0.6rem; color: var(--muted); margin-top: 0.25rem; letter-spacing: 0.08em; }
  .hum-bar { height: 2px; background: var(--surface2); margin-top: 0.75rem; overflow: hidden; }
  .hum-fill { height: 100%; background: var(--accent); transition: width 0.8s ease; width: 0; }

  /* Sun strip */
  .sun-strip {
    background: var(--surface); border: 1px solid var(--border);
    padding: 1.25rem 2rem; display: flex; align-items: center;
    gap: 2rem; margin-bottom: 3rem;
  }
  .sun-item { display: flex; align-items: center; gap: 1rem; }
  .sun-icon { font-size: 1.3rem; }
  .sun-label { font-size: 0.62rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 0.15rem; }
  .sun-time { font-size: 1.4rem; font-weight: 700; color: var(--white); letter-spacing: -0.02em; }
  .sun-div { flex: 1; height: 1px; background: linear-gradient(to right, var(--accent), transparent); opacity: 0.25; }

  /* Forecast */
  .section-label { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; }
  .forecast-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 2px; }
  .fc { background: var(--surface); border: 1px solid var(--border); padding: 1.5rem 1.25rem; display: flex; flex-direction: column; gap: 0.5rem; transition: background 0.15s; }
  .fc:hover { background: var(--surface2); }
  .fc-day { font-size: 0.62rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); }
  .fc-icon { font-size: 1.6rem; line-height: 1; margin: 0.25rem 0; }
  .fc-desc { font-size: 0.65rem; color: var(--muted); }
  .fc-temps { display: flex; gap: 0.75rem; align-items: baseline; margin-top: auto; }
  .fc-hi { font-size: 1.5rem; font-weight: 700; color: var(--white); line-height: 1; }
  .fc-lo { font-size: 1rem; color: var(--muted); line-height: 1; }

  /* Toast */
  .toast {
    position: fixed; bottom: 2rem; left: 50%;
    transform: translateX(-50%) translateY(12px);
    background: #1a1a1a; color: var(--text); border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    font-size: 0.8rem; padding: 0.85rem 1.5rem;
    opacity: 0; pointer-events: none; transition: all 0.25s;
    z-index: 999; white-space: nowrap; border-radius: 1px;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Loader */
  .loader {
    position: fixed; inset: 0; background: rgba(12,12,12,0.85);
    display: none; align-items: center; justify-content: center; z-index: 500;
  }
  .loader.on { display: flex; }
  .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.5s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Footer */
  .footer { border-top: 1px solid var(--border); padding: 1.25rem 2rem; }
  .footer-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 2rem; }
  .footer-logo { font-size: 0.9rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); }
  .footer-note { font-size: 0.65rem; color: var(--muted); }
  .footer-note a { color: var(--dim); text-decoration: none; }
  .footer-note a:hover { color: var(--text); }
  .footer-copy { margin-left: auto; font-size: 0.65rem; color: var(--muted); }

  /* Responsive */
  @media (max-width: 960px) { .stats-grid { grid-template-columns: repeat(3,1fr); } }
  @media (max-width: 640px) {
    .hero { padding: 3rem 1.25rem 2.5rem; }
    .weather-section { padding: 2rem 1.25rem 3rem; }
    .main-card { grid-template-columns: 1fr; padding: 1.5rem; gap: 0.75rem; }
    .temp-col { grid-row: auto; text-align: left; }
    .condition-row { justify-content: flex-start; }
    .stats-grid { grid-template-columns: repeat(2,1fr); }
    .forecast-grid { grid-template-columns: repeat(2,1fr); }
    .nav { display: none; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">Skies</div>
    <nav class="nav">
      <a href="#" class="active">Today</a>
      <a href="#">Forecast</a>
    </nav>
    <button class="unit-btn" id="unitBtn">°C / °F</button>
  </div>
</header>

<section class="hero">
  <div class="hero-inner">
    <p class="eyebrow">Real-time weather data</p>
    <h1 class="hero-title">What's the <span>sky</span><br/>doing today?</h1>

    <!-- IMPORTANT: real <form> so Enter key always works -->
    <form class="search-form" id="searchForm" onsubmit="handleSearch(event)">
      <input
        type="text" id="cityInput" class="search-input"
        placeholder="Enter city name..." autocomplete="off"
        spellcheck="false"
      />
      <button type="submit" class="search-btn">Search</button>
    </form>

    <button class="loc-btn" id="locBtn">⊕ Use my location</button>
  </div>
</section>

<section class="weather-section" id="weatherSection" style="display:none">
  <div class="container">

    <div class="main-card">
      <div>
        <div class="city-tag">📍 <span id="cityName">—</span>, <span id="countryName">—</span></div>
        <div class="local-time" id="localTime">—</div>
      </div>
      <div class="temp-col">
        <div class="temp-big" id="tempVal">—</div>
        <div class="condition-row">
          <span class="cond-icon" id="condIcon"></span>
          <span class="cond-text" id="condText">—</span>
        </div>
      </div>
      <div class="feels" id="feelsLike">Feels like —</div>
    </div>

    <div class="stats-grid">
      <div class="stat">
        <div class="stat-label">Humidity</div>
        <div class="stat-val" id="humidity">—</div>
        <div class="stat-unit">%</div>
        <div class="hum-bar"><div class="hum-fill" id="humFill"></div></div>
      </div>
      <div class="stat">
        <div class="stat-label">Wind</div>
        <div class="stat-val" id="wind">—</div>
        <div class="stat-unit">km/h</div>
      </div>
      <div class="stat">
        <div class="stat-label">Visibility</div>
        <div class="stat-val" id="vis">—</div>
        <div class="stat-unit">km</div>
      </div>
      <div class="stat">
        <div class="stat-label">Pressure</div>
        <div class="stat-val" id="pressure">—</div>
        <div class="stat-unit">hPa</div>
      </div>
      <div class="stat">
        <div class="stat-label">UV Index</div>
        <div class="stat-val" id="uv">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Dew Point</div>
        <div class="stat-val" id="dew">—</div>
      </div>
    </div>

    <div class="sun-strip">
      <div class="sun-item">
        <span class="sun-icon">🌅</span>
        <div><span class="sun-label">Sunrise</span><span class="sun-time" id="sunrise">—</span></div>
      </div>
      <div class="sun-div"></div>
      <div class="sun-item">
        <span class="sun-icon">🌇</span>
        <div><span class="sun-label">Sunset</span><span class="sun-time" id="sunset">—</span></div>
      </div>
    </div>

    <div class="section-label">5-Day Forecast</div>
    <div class="forecast-grid" id="forecastGrid"></div>

  </div>
</section>

<div class="toast" id="toast"></div>
<div class="loader" id="loader"><div class="spinner"></div></div>

<footer class="footer">
  <div class="footer-inner">
    <span class="footer-logo">Skies</span>
    <span class="footer-note">Powered by <a href="https://open-meteo.com" target="_blank">Open-Meteo</a> · No API key required</span>
    <span class="footer-copy">© 2025</span>
  </div>
</footer>

<script>
// ─── CONFIG ───────────────────────────────────────────────
const GEO_API     = 'https://geocoding-api.open-meteo.com/v1/search';
const WEATHER_API = 'https://api.open-meteo.com/v1/forecast';

// ─── STATE ────────────────────────────────────────────────
let isCelsius = true;
let lastGeo   = null;
let lastWx    = null;
let toastTmr  = null;

// ─── WMO CODE MAP ─────────────────────────────────────────
const WMO = {
  0:['☀️','Clear Sky'],      1:['🌤️','Mainly Clear'],   2:['⛅','Partly Cloudy'],
  3:['☁️','Overcast'],       45:['🌫️','Foggy'],          48:['🌫️','Icy Fog'],
  51:['🌦️','Light Drizzle'], 53:['🌦️','Drizzle'],        55:['🌧️','Heavy Drizzle'],
  61:['🌧️','Light Rain'],    63:['🌧️','Rain'],            65:['🌧️','Heavy Rain'],
  71:['🌨️','Light Snow'],    73:['❄️','Snow'],             75:['❄️','Heavy Snow'],
  80:['🌦️','Showers'],       81:['🌧️','Showers'],         82:['⛈️','Heavy Showers'],
  85:['🌨️','Snow Showers'],  95:['⛈️','Thunderstorm'],    96:['⛈️','Thunderstorm'],
  99:['⛈️','Thunderstorm'],
};

// ─── HELPERS ──────────────────────────────────────────────
const el = id => document.getElementById(id);

function showLoader()  { el('loader').classList.add('on'); }
function hideLoader()  { el('loader').classList.remove('on'); }

function showToast(msg) {
  clearTimeout(toastTmr);
  el('toast').textContent = msg;
  el('toast').classList.add('show');
  toastTmr = setTimeout(() => el('toast').classList.remove('show'), 4000);
}

function fmtTemp(c) {
  if (c == null) return '—';
  const v = isCelsius ? Math.round(c) : Math.round(c * 9/5 + 32);
  return v + '°' + (isCelsius ? 'C' : 'F');
}

function fmtTime(isoStr) {
  try { return new Date(isoStr).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }); }
  catch { return '—'; }
}

function shortDay(isoDate) {
  try { return new Date(isoDate + 'T12:00:00').toLocaleDateString([], { weekday:'short' }); }
  catch { return '—'; }
}

function getLocalTime(tz) {
  try {
    return new Date().toLocaleTimeString([], { timeZone:tz, weekday:'long', hour:'2-digit', minute:'2-digit' });
  } catch { return new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }); }
}

// ─── API CALLS ────────────────────────────────────────────
async function geocodeCity(city) {
  const url = `${GEO_API}?name=${encodeURIComponent(city.trim())}&count=5&language=en&format=json`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Geocoding error: ${res.status}`);
  const data = await res.json();
  if (!data.results || data.results.length === 0) {
    throw new Error(`No results for "${city}". Try a different spelling.`);
  }
  return data.results[0];
}

async function getWeather(lat, lon, tz) {
  const params = new URLSearchParams({
    latitude:  lat,
    longitude: lon,
    timezone:  tz || 'auto',
    current: [
      'temperature_2m','apparent_temperature','relative_humidity_2m',
      'weather_code','wind_speed_10m','visibility','surface_pressure','dew_point_2m'
    ].join(','),
    daily: [
      'weather_code','temperature_2m_max','temperature_2m_min',
      'sunrise','sunset','uv_index_max'
    ].join(','),
    forecast_days: 6,
    timeformat: 'iso8601',
  });

  const url = `${WEATHER_API}?${params}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Weather API error: ${res.status}`);
  const data = await res.json();
  if (data.error) throw new Error(data.reason || 'Weather API error');
  return data;
}

// ─── RENDER ───────────────────────────────────────────────
function renderWeather(geo, wx) {
  lastGeo = geo;
  lastWx  = wx;

  const c = wx.current;
  const d = wx.daily;
  const tz = wx.timezone || 'UTC';

  const [icon, desc] = WMO[c.weather_code] || ['🌡️', 'Unknown'];

  // Header info
  el('cityName').textContent    = geo.name || '—';
  el('countryName').textContent = geo.country || geo.country_code || '';
  el('localTime').textContent   = getLocalTime(tz);

  // Temperature
  el('tempVal').textContent  = fmtTemp(c.temperature_2m);
  el('condIcon').textContent = icon;
  el('condText').textContent = desc;
  el('feelsLike').textContent = 'Feels like ' + fmtTemp(c.apparent_temperature);

  // Stats
  el('humidity').textContent = c.relative_humidity_2m ?? '—';
  el('humFill').style.width  = (c.relative_humidity_2m ?? 0) + '%';
  el('wind').textContent     = c.wind_speed_10m != null ? Math.round(c.wind_speed_10m) : '—';
  el('vis').textContent      = c.visibility != null ? (c.visibility / 1000).toFixed(1) : '—';
  el('pressure').textContent = c.surface_pressure != null ? Math.round(c.surface_pressure) : '—';
  el('uv').textContent       = d.uv_index_max?.[0] != null ? d.uv_index_max[0].toFixed(1) : '—';
  el('dew').textContent      = fmtTemp(c.dew_point_2m);

  // Sun
  el('sunrise').textContent = fmtTime(d.sunrise[0]);
  el('sunset').textContent  = fmtTime(d.sunset[0]);

  // Forecast (skip index 0 = today)
  const grid = el('forecastGrid');
  grid.innerHTML = '';
  for (let i = 1; i <= 5; i++) {
    const [fi, ft] = WMO[d.weather_code[i]] || ['🌡️','—'];
    const card = document.createElement('div');
    card.className = 'fc';
    card.innerHTML =
      `<div class="fc-day">${shortDay(d.time[i])}</div>` +
      `<div class="fc-icon">${fi}</div>` +
      `<div class="fc-desc">${ft}</div>` +
      `<div class="fc-temps">` +
        `<span class="fc-hi">${fmtTemp(d.temperature_2m_max[i])}</span>` +
        `<span class="fc-lo">${fmtTemp(d.temperature_2m_min[i])}</span>` +
      `</div>`;
    grid.appendChild(card);
  }

  el('weatherSection').style.display = 'block';
  el('weatherSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ─── SEARCH FLOW ──────────────────────────────────────────
async function searchCity(city) {
  if (!city || !city.trim()) {
    showToast('Please type a city name first');
    el('cityInput').focus();
    return;
  }

  showLoader();
  try {
    const geo = await geocodeCity(city);
    const wx  = await getWeather(geo.latitude, geo.longitude, geo.timezone);
    renderWeather(geo, wx);
  } catch (err) {
    console.error('[SKIES]', err);
    showToast(err.message || 'Something went wrong. Please try again.');
  } finally {
    hideLoader();
  }
}

// ─── FORM HANDLER (called from onsubmit) ──────────────────
function handleSearch(event) {
  event.preventDefault();
  const city = el('cityInput').value;
  searchCity(city);
}

// ─── GEOLOCATION ──────────────────────────────────────────
el('locBtn').addEventListener('click', () => {
  if (!navigator.geolocation) { showToast('Geolocation not supported by your browser'); return; }

  showLoader();
  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      try {
        const { latitude: lat, longitude: lon } = pos.coords;
        const wx = await getWeather(lat, lon, 'auto');

        // reverse geocode via Nominatim
        let cityName = 'Your Location', country = '';
        try {
          const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
          const rd = await r.json();
          cityName = rd.address?.city || rd.address?.town || rd.address?.village || 'Your Location';
          country  = rd.address?.country || '';
        } catch (_) { /* ignore reverse geocode failure */ }

        renderWeather({ name: cityName, country, latitude: lat, longitude: lon }, wx);
      } catch (err) {
        console.error('[SKIES geoloc]', err);
        showToast('Could not fetch weather for your location');
      } finally { hideLoader(); }
    },
    (err) => {
      hideLoader();
      if (err.code === 1) showToast('Location permission denied');
      else showToast('Could not get your location');
    },
    { timeout: 10000 }
  );
});

// ─── UNIT TOGGLE ──────────────────────────────────────────
el('unitBtn').addEventListener('click', () => {
  isCelsius = !isCelsius;
  el('unitBtn').textContent = isCelsius ? '°C / °F' : '°F / °C';
  if (lastGeo && lastWx) renderWeather(lastGeo, lastWx);
});

// ─── CLOCK UPDATE ─────────────────────────────────────────
setInterval(() => {
  if (lastWx) el('localTime').textContent = getLocalTime(lastWx.timezone);
}, 60000);

// ─── DEFAULT LOAD ─────────────────────────────────────────
searchCity('Tokyo');
</script>
</body>
</html>
